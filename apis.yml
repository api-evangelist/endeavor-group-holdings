aid: endeavor-group-holdings
name: Endeavor Group Holdings
description: >-
  Endeavor Group Holdings was a global sports and entertainment company that
  represented talent, owned and operated events, and provided licensing,
  marketing, and media services through subsidiaries including WME, IMG, and
  UFC. Following the 2024 take-private transaction by Silver Lake and the
  separation of TKO Group Holdings (UFC and WWE), the remaining talent
  representation, media, marketing, and licensing businesses were rebranded as
  WME Group, which now operates WME, 160over90, Pantheon Media Group, and IMG
  Licensing. No public developer APIs are currently published.
